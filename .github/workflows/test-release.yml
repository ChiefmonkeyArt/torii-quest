name: test-release

# Runs the full release gate on every PR and every push to main.
# Mirrors the local `npm run test:release` chain:
#   build + Vitest + check + bundle:report + handoff:status
# A PR must show green here before it is safe to merge.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: test-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-release:
    name: npm run test:release
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run release gate
        run: npm run test:release
